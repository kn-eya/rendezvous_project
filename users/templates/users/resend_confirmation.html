{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Renvoyer l'email de confirmation</h3>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}

          <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label for="email" class="form-label">E-mail utilisé à l'inscription</label>
              <input type="email" class="form-control" id="email" name="email" required placeholder="vous@example.com">
            </div>
            <button type="submit" class="btn btn-primary w-100">Renvoyer le lien</button>
          </form>

          <p class="text-center mt-3 mb-0">
            <a href="{% url 'users:login' %}">Retour à la connexion</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
