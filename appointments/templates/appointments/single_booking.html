{% extends "base.html" %}
{% block title %}Réserver Rendez-vous{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Réserver un rendez-vous pour {{ service.name }}</h2>

    <form id="bookingForm" method="post" class="mt-4">
        {% csrf_token %}

        <!-- Catégorie -->
        <div class="mb-3">
            <label for="category" class="form-label">Catégorie</label>
            <select name="category" id="category" class="form-select" required>
                <option value="">-- Sélectionner --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }} - {{ cat.price }} DT</option>
                {% endfor %}
            </select>
        </div>

        <!-- Prestataire -->
        <div class="mb-3">
            <label for="provider" class="form-label">Prestataire</label>
            <select name="provider" id="provider" class="form-select" required>
                <option value="">-- Sélectionner --</option>
                {% for p in providers %}
                    <option value="{{ p.id }}">{{ p.user.username }}{% if p.city %} ({{ p.city }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Date et Heure -->
        <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input type="date" name="date" id="date" class="form-control" >
        </div>

        <div class="mb-3">
            <label for="start_time" class="form-label">Heure</label>
            <input type="time" name="start_time" id="start_time" class="form-control" >
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label">Notes (optionnel)</label>
            <textarea name="notes" rows="3" class="form-control"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Réserver</button>
    </form>
</div>

<!-- Modal calendrier -->
<div class="modal fade" id="calendarModal" tabindex="-1" aria-labelledby="calendarModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="calendarModalLabel">Agenda du prestataire</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
      </div>
      <div class="modal-body">
        <div id="providerCalendar" style="height: 80vh; min-height: 600px;"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
      </div>
    </div>
  </div>
</div>

<!-- CSS & JS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const providerSelect = document.getElementById("provider");
    const calendarModal = new bootstrap.Modal(document.getElementById("calendarModal"));
    const dateInput = document.getElementById("date");
    const timeInput = document.getElementById("start_time");
    let calendar;

    providerSelect.addEventListener("change", function() {
        const providerId = this.value;
        if (!providerId) return;

        calendarModal.show();

        const modalEl = document.getElementById("calendarModal");

        modalEl.addEventListener('shown.bs.modal', function () {
            if(calendar){
                calendar.destroy();
            }

            const calendarEl = document.getElementById("providerCalendar");
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'fr',
                slotMinTime: "08:00:00",
                slotMaxTime: "18:00:00",
                allDaySlot: false,
                height: '80vh',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridWeek,timeGridDay'
                },
                events: `/appointments/provider/${providerId}/agenda/events/`,
                selectable: true,
                select: function(info) {
                    if(info.event.extendedProps.booked){
                        alert("Ce créneau est déjà réservé !");
                        return;
                    }
                    dateInput.value = info.startStr.split('T')[0];
                    timeInput.value = info.startStr.split('T')[1].substring(0,5);
                    calendarModal.hide();
                }
            });

            calendar.render();
        }, { once: true });
    });
});
</script>
{% endblock %}
